# Postgres local pour le développement Lasylab.
# Démarrage : npm run db:up  (dans apps/backend)
services:
  db:
    image: postgres:16-alpine
    container_name: lasylab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lasylab
      POSTGRES_PASSWORD: lasylab
      POSTGRES_DB: lasylab
    ports:
      - '5432:5432'
    volumes:
      - lasylab_pgdata:/var/lib/postgresql/data

volumes:
  lasylab_pgdata:
